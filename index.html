<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>TechNova Solutions</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #222;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #0f172a;
            color: white; }

        .logo {
            font-size: 22px;
            font-weight: bold; }
 nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px; }

        nav a:hover {
            color: #38bdf8; }
      
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;}

        .hero h1 {
            font-size: 36px;
            margin-bottom: 10px;}

        .hero button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: white;
            color: #0f172a;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;}

        .hero button:hover {
            background: #e2e8f0;}
    
        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 60px 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);}

        footer {
            text-align: center;
            padding: 20px;
            background: #0f172a;
            color: white;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">TechNova</div>
        <nav>
            <a href="#">Main</a>
            <a href="#">Services</a>
            <a href="#">About us</a>
            <a href="#">Contacts</a>
        </nav>
    </header>

    <section class="hero">
        <h1>We create new digital solutions</h1>
        <p>Web pages,apps and business automation</p>
        <button>Learn more</button>
    </section>

    <section class="services">
        <div class="card">
            <h3>Web Development</h3>
            <p>Professional page creation</p>
        </div>

        <div class="card">
            <h3>UI/UX Design</h3>
            <p>Avant-garde design</p>
        </div>

        <div class="card">
            <h3>Support</h3>
            <p>24/7 tech support</p>
        </div>
    </section>

    <footer>
        <p>© 2026 TechNova Solutions։</p>
    </footer>

</body>
</html>
